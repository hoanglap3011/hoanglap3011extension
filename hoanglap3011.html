<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link động từ API</title>

  <link rel="stylesheet" href="library/bootstrap.min.css">
  <link rel="stylesheet" href="hoanglap3011.css">
</head>

<body>
  <div class="text-center fw-bold text-success fs-4 mb-4">
    Chào Lập, chúc bạn một ngày tốt lành ❤️<br>
    Hôm nay là <span id="current-date"></span>.
  </div>

  <!-- Quote -->
  <div class="container mb-3" id="divQuote">
    <div class="mb-2 text-center">
      <select id="quoteCategory" class="form-select w-auto d-inline-block"></select>
    </div>
    <div class="row align-items-center">
      <div class="col-auto"><button class="btn btn-outline-secondary" id="btnPrevQuote">←</button></div>
      <div class="col text-center">
        <div class="text-muted fs-5" id="daily-quote"></div>
      </div>
      <div class="col-auto"><button class="btn btn-outline-secondary" id="btnNextQuote">→</button></div>
    </div>
  </div>

  <!-- Danh sách nút: render từ mảng LINKS trong hoanglap3011.js -->
  <div class="container-fluid px-4">
    <div class="row" id="link-row"></div>
  </div>

  <!-- Player YouTube cho Hít thở / Nhạc học tập -->
  <div class="container-fluid px-4 mt-4">
    <div id="divIframeYoutube">
      <iframe id="iframeYoutube" title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="PasswordModule.js"></script>
  <script type="module" src="hoanglap3011.js"></script>
</body>

</html>
