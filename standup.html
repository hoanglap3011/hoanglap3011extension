<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standup — Nhắc nhở đứng dậy</title>
  <link rel="stylesheet" href="neo_anchor.css" />
  <style>
    .num-field { display: flex; align-items: center; gap: 10px; }
    .num-field input { width: 100px; background: var(--ink); border: 1px solid var(--line); border-radius: 7px;
      color: var(--paper); padding: 10px 12px; font: inherit; }
    .num-field input:focus { outline: 2px solid var(--amber); outline-offset: 1px; border-color: transparent; }
    .num-field span { color: var(--muted); font-size: 13px; }

    /* Countdown block */
    #countdownBlock { text-align: center; padding: 10px 0 4px; }
    .countdown-label { font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; }
    .countdown-clock { font-size: 52px; font-weight: 700; font-variant-numeric: tabular-nums;
      letter-spacing: -.02em; color: var(--paper); line-height: 1; margin-bottom: 6px; }
    .countdown-sub { font-size: 12px; color: var(--muted); }

    /* Alert state */
    #alertBlock { text-align: center; padding: 8px 0; }
    .alert-badge { display: inline-block; background: #ff3b3022; border: 1px solid #ff3b3055;
      color: #ff6b60; border-radius: 8px; padding: 4px 12px; font-size: 12px; font-weight: 600;
      letter-spacing: .08em; margin-bottom: 14px; }
    .alert-title { font-size: 26px; font-weight: 800; color: var(--paper); margin-bottom: 8px; }
    .alert-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="masthead">
      <div class="eyebrow">STANDUP — NHẮC NHỞ ĐI LẠI</div>
      <h1>Đừng ngồi quá lâu.</h1>
    </header>

    <section class="card">
      <!-- Cài đặt — ẩn khi đang tracking -->
      <div id="setupBlock">
        <label class="field">
          <span class="label">Ngồi tối đa</span>
          <div class="num-field">
            <input id="maxSec" type="number" min="10" max="7200" step="30" value="2700" />
            <span>giây</span>
          </div>
          <span class="hint" id="secHint">2700 giây = 45 phút. Nhập 10–60 để test nhanh.</span>
        </label>
        <button id="startBtn" class="primary">Bắt đầu theo dõi</button>
      </div>

      <!-- Đếm ngược — hiện khi đang tracking -->
      <div id="countdownBlock" hidden>
        <div class="countdown-label">Còn lại trước khi nhắc</div>
        <div class="countdown-clock" id="clockDisplay">--:--</div>
        <div class="countdown-sub" id="clockSub"></div>
        <button id="stopBtn" class="ghost" style="margin-top:20px">Dừng theo dõi</button>
      </div>

      <!-- Alert — hiện khi hết giờ -->
      <div id="alertBlock" hidden>
        <div class="alert-badge">ĐÃ QUÁ GIỜ NGỒI</div>
        <div class="alert-title">Đứng dậy đi!</div>
        <div class="alert-sub">Di chuyển, thay đổi tư thế một chút</div>
        <button id="doneBtn" class="primary">Đã đứng dậy ✓</button>
        <button id="stopFromAlert" class="ghost" style="margin-top:10px">Dừng theo dõi</button>
      </div>
    </section>
  </main>

  <script src="standup.js"></script>
</body>
</html>
