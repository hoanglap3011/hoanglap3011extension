<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Từ Vựng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tuvung.css" />
</head>
<body>

  
  <div id="sectionManager" class="d-none">
    <header class="mgr-header">
      <div class="mgr-header-inner">
        <div class="mgr-logo">
          <span class="mgr-logo-icon">辞</span>
          <div>
            <h1 class="mgr-title">Từ Vựng</h1>
            <p class="mgr-subtitle">Vocabulary Manager</p>
          </div>
        </div>
        <div class="mgr-header-actions">
          <span class="mgr-count" id="wordCount">0 từ</span>
          
          <button class="btn-icon-header" id="btnSettings" title="Cài đặt từ vựng">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>

          <button class="btn-primary" id="btnPullServer" title="Ghi đè local bằng dữ liệu từ Google Sheet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Đồng bộ
          </button>
          
          <button class="btn-primary" id="btnDemo" title="Xem lại từ bất kỳ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            Xem từ bất kỳ
          </button>

          <button class="btn-primary" id="btnOpenForm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Thêm từ mới
          </button>
        </div>
      </div>
    </header>

    <main class="mgr-main">

      <div class="mgr-search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Tìm từ vựng…" />
      </div>

      <div class="word-list" id="wordList"></div>
      
      <div class="empty-state d-none" id="emptyState">
        <div class="empty-icon">📖</div>
        <p class="empty-text">Chưa có từ vựng nào.<br/>Nhấn <strong>+ Thêm từ mới</strong> để bắt đầu!</p>
      </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
      <div class="comp-card" id="modalContainer"></div>
    </div>

    
    <div class="modal-overlay" id="settingsOverlay">
      <div class="comp-card" id="settingsContainer">
        <div class="comp-header">
          <div class="comp-logo">
            <span class="comp-logo-icon">⚙️</span>
            <div>
              <h2 class="comp-title">Cài đặt</h2>
              <p class="comp-subtitle">Từ Vựng</p>
            </div>
          </div>
          <button class="comp-close" id="btnCloseSettings">✕</button>
        </div>
        <div class="comp-body">

          <div class="form-group">
            <label class="form-label">Popup tự động</label>
            <div class="tv-setting-row">
              <span class="tv-setting-label-modal">Bật / Tắt</span>
              <label class="tv-switch">
                <input type="checkbox" id="tvEnableAutoPopup" />
                <span class="tv-slider"></span>
              </label>
            </div>
            <div id="popupSettingsArea">
              <div class="tv-slider-label-row mt-3">
                <label class="form-label" style="margin-bottom:0;text-transform:none;color:var(--white);">Thời gian tự đóng popup</label>
                <span class="tv-slider-value-badge" id="tvAutoCloseDisplay">30 giây</span>
              </div>
              <div class="tv-range-wrap mb-3">
                <span class="tv-range-min">10s</span>
                <input type="range" id="tvAutoCloseSec" class="tv-range" min="10" max="120" value="30" step="5" />
                <span class="tv-range-max">2p</span>
              </div>
              <div class="tv-slider-label-row">
                <label class="form-label" style="margin-bottom:0;text-transform:none;color:var(--white);">Khoảng cách giữa các popup</label>
                <span class="tv-slider-value-badge" id="tvTimerRangeDisplay">5 – 10 phút</span>
              </div>
              <div class="tv-range-wrap">
                <span class="tv-range-min">10s</span>
                <div class="tv-dual-range-track">
                  <div class="tv-dual-range-fill" id="tvTimerFill"></div>
                  <input type="range" id="tvTimerMinSec" class="tv-dual-range-input" min="10" max="1800" value="300" step="10" />
                  <input type="range" id="tvTimerMaxSec" class="tv-dual-range-input" min="10" max="1800" value="600" step="10" />
                </div>
                <span class="tv-range-max">30p</span>
              </div>
            </div>
          </div>

          <p class="comp-status" id="tvSettingsStatus"></p>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="confirmOverlay">
      <div class="confirm-box">
        <div class="confirm-icon">🗑️</div>
        <h3 class="confirm-title" id="confirmMsg">Xóa từ này?</h3>
        <div class="form-actions">
          <button class="btn-cancel" id="btnCancelDelete">Hủy</button>
          <button class="btn-danger" id="btnConfirmDelete">Xóa</button>
        </div>
      </div>
    </div>
  </div>

  
  <div id="sectionStandalone" class="d-none">
    <div id="standaloneContainer"></div>
  </div>

  
  
  
  <template id="tpl-form">
    <div class="comp-header">
      <div class="comp-logo">
        <span class="comp-logo-icon">辞</span>
        <div>
          <h2 class="comp-title">Thêm từ mới</h2>
          <p class="comp-subtitle">Vocabulary Manager</p>
        </div>
      </div>
      <button class="comp-close" aria-label="Đóng">✕</button>
    </div>
    <form class="comp-body" autocomplete="off">
      <div class="form-group">
        <label class="form-label">Từ <span class="required">*</span></label>
        <input type="text" name="word" class="form-input" placeholder="e.g. ephemeral" required />
      </div>
      <div class="form-group">
        <label class="form-label">Từ loại</label>
        <div class="pos-radio-group">
          <label class="pos-radio-label"><input type="radio" name="partOfSpeech" value="Noun" /><span>Noun</span></label>
          <label class="pos-radio-label"><input type="radio" name="partOfSpeech" value="Verb" /><span>Verb</span></label>
          <label class="pos-radio-label"><input type="radio" name="partOfSpeech" value="Adjective" /><span>Adj.</span></label>
          <label class="pos-radio-label"><input type="radio" name="partOfSpeech" value="Adverb" /><span>Adv.</span></label>
          <label class="pos-radio-label"><input type="radio" name="partOfSpeech" value="Phrase" /><span>Phrase</span></label>
          <label class="pos-radio-label"><input type="radio" name="partOfSpeech" value="Preposition" /><span>Prep.</span></label>
          <label class="pos-radio-label"><input type="radio" name="partOfSpeech" value="Conjunction" /><span>Conj.</span></label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">IPA</label>
        <input type="text" name="ipa" class="form-input form-input--ipa" placeholder="e.g. /ɪˈfem.ər.əl/" />
      </div>
      <div class="form-group">
        <label class="form-label">Tiếng Việt <span class="required">*</span></label>
        <input type="text" name="meaning" class="form-input" placeholder="e.g. phù du, thoáng qua" required />
      </div>
      <div class="form-group">
        <label class="form-label">Ví dụ</label>
        <textarea name="example" class="form-input form-textarea" placeholder="e.g. Beauty is ephemeral, but art endures."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Nghĩa ví dụ</label>
        <textarea name="exampleMeaning" class="form-input form-textarea" placeholder="e.g. Vẻ đẹp thì phù du..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Ảnh ví dụ</label>
        <div class="form-upload-row">
          <input type="text" name="imageUrl" class="form-input form-input--upload" placeholder="Nhập link ảnh (URL)..." />
          <label class="btn-primary btn-upload">
            Tải lên
            <input type="file" name="imageFile" accept="image/*" class="d-none" />
          </label>
        </div>
        <div class="image-preview-wrap d-none">
          <img class="image-preview" src="" alt="Preview" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Ghi chú</label>
        <textarea name="note" class="form-input form-textarea" placeholder="Từ loại, gốc từ..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Từ gần nghĩa</label>
        <textarea name="synonyms" class="form-input form-textarea" placeholder="e.g. transient, fleeting, short-lived"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Từ dễ nhầm lẫn</label>
        <textarea name="confusingWords" class="form-input form-textarea" placeholder="Từ viết / phát âm gần giống, dễ nhầm..."></textarea>
      </div>
      <div class="form-group form-group--checkbox">
        <label class="form-checkbox-label">
          <input type="checkbox" name="isActive" checked />
          <span>Kích hoạt hiển thị ngẫu nhiên</span>
        </label>
      </div>
      <div class="comp-actions">
        <button type="button" class="btn-cancel">Hủy</button>
        <button type="submit" class="btn-primary btn-submit">Lưu từ</button>
      </div>
      <p class="comp-status"></p>
    </form>
  </template>

  
  <template id="tpl-display">
    <div class="display-wrap">
      <div class="display-header">
        <div class="display-header-left">
          <span class="display-word-title"></span>
          <span class="display-pos-badge d-none"></span>
        </div>
        <div class="display-header-right">
          <span class="display-countdown d-none"></span>
          <button class="comp-close btn-close-display">✕</button>
        </div>
      </div>

      <div class="display-body">

        <!-- Cột trái: IPA + các toggle nội dung -->
        <div class="display-col-left">

          <div class="display-ipa-row">
            <button class="btn-play-audio" title="Nghe phát âm">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
              </svg>
            </button>
            <div class="display-ipa"></div>
          </div>

          <div class="display-toggle-row display-meaning-row">
            <button class="btn-toggle btn-toggle-meaning">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span class="toggle-label">Nghĩa tiếng Việt</span>
            </button>
            <div class="display-meaning d-none"></div>
          </div>

          <div class="display-toggle-row display-example-row d-none">
            <button class="btn-toggle btn-toggle-example">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span class="toggle-label">Câu ví dụ</span>
            </button>
            <div class="display-example-content d-none">
              <button class="btn-play-audio btn-play-example">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
              </button>
              <span class="display-section-text text-example"></span>
            </div>
          </div>

          <div class="display-toggle-row section-example-meaning d-none">
            <button class="btn-toggle btn-toggle-example-meaning">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span class="toggle-label">Nghĩa câu ví dụ</span>
            </button>
            <div class="display-section-text text-example-meaning d-none"></div>
          </div>

          <div class="display-toggle-row section-note d-none">
            <button class="btn-toggle btn-toggle-note">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span class="toggle-label">Chú thích</span>
            </button>
            <div class="display-note d-none"></div>
          </div>

          <div class="display-toggle-row section-synonyms d-none">
            <button class="btn-toggle btn-toggle-synonyms">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span class="toggle-label">Từ gần nghĩa</span>
            </button>
            <div class="display-section-text display-synonyms d-none"></div>
          </div>

          <div class="display-toggle-row section-confusing d-none">
            <button class="btn-toggle btn-toggle-confusing">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span class="toggle-label">Từ dễ nhầm lẫn</span>
            </button>
            <div class="display-section-text display-confusing d-none"></div>
          </div>

        </div>

        <!-- Cột phải: toggle ảnh + ảnh (ẩn cả cột nếu không có ảnh) -->
        <div class="display-col-right d-none">
          <div class="display-toggle-row section-image">
            <button class="btn-toggle btn-toggle-image">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span class="toggle-label">Ảnh minh hoạ</span>
            </button>
            <div class="display-image-wrap d-none">
              <img class="display-example-img" src="" alt="Hình minh hoạ" />
            </div>
          </div>
        </div>

      </div>
    </div>
  </template>

  <script src="config.js"></script>
  <script src="PasswordModule.js"></script>
  <script type="module" src="tuvung.js"></script>
</body>
</html>
