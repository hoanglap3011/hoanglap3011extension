<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Từ Vựng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tuvung.css" />
</head>

<!--
  MODE DETECTION (do tuvung.js xử lý tự động):
    tuvung.html              → trang quản lý từ vựng  (class="manager-body")
    tuvung.html?mode=popup   → popup hiển thị từ ngẫu nhiên (class="popup-body")
-->
<body>

  <!-- ═══════════════════════════════════════════
       SECTION A — MANAGER (mặc định)
       ═══════════════════════════════════════════ -->
  <div id="sectionManager" style="display:none">

    <header class="mgr-header">
      <div class="mgr-header-inner">
        <div class="mgr-logo">
          <span class="mgr-logo-icon">辞</span>
          <div>
            <h1 class="mgr-title">Từ Vựng</h1>
            <p class="mgr-subtitle">Vocabulary Manager</p>
          </div>
        </div>
        <div class="mgr-header-actions">
          <span class="mgr-count" id="wordCount">0 từ</span>
          <!-- 🆕 Nút đồng bộ từ server -->
          <button class="btn-pull-server" id="btnPullServer" title="Ghi đè local bằng dữ liệu từ Google Sheet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Đồng bộ từ server
          </button>
          <button class="btn-primary" id="btnOpenForm">+ Thêm từ mới</button>
        </div>
      </div>
    </header>

    <main class="mgr-main">
      <div class="mgr-search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Tìm từ vựng…" />
        <button class="btn-demo" id="btnDemo" title="Xem lại từ bất kỳ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          Xem lại từ bất kỳ
        </button>
      </div>

      <div class="word-list" id="wordList"></div>

      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">📖</div>
        <p class="empty-text">Chưa có từ vựng nào.<br/>Nhấn <strong>+ Thêm từ mới</strong> để bắt đầu!</p>
      </div>
    </main>

    <!-- Modal thêm/sửa -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box">
        <div class="modal-header">
          <h2 class="modal-title" id="modalTitle">Thêm từ mới</h2>
          <button class="modal-close" id="btnCloseModal" aria-label="Đóng">✕</button>
        </div>
        <form class="modal-form" id="wordForm" autocomplete="off">
          <input type="hidden" id="editIndex" value="-1" />

          <div class="form-group">
            <label class="form-label" for="fieldWord">Từ mới <span class="required">*</span></label>
            <input type="text" id="fieldWord" class="form-input" placeholder="e.g. ephemeral" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="fieldMeaning">Nghĩa tiếng Việt <span class="required">*</span></label>
            <input type="text" id="fieldMeaning" class="form-input" placeholder="e.g. phù du, thoáng qua" required />
          </div>

          <!-- 🆕 Phát âm IPA -->
          <div class="form-group">
            <label class="form-label" for="fieldIpa">Phát âm IPA</label>
            <input type="text" id="fieldIpa" class="form-input form-input--ipa" placeholder="e.g. /ɪˈfem.ər.əl/" />
          </div>

          <div class="form-group">
            <label class="form-label" for="fieldExample">Câu ví dụ</label>
            <textarea id="fieldExample" class="form-input form-textarea" placeholder="e.g. Beauty is ephemeral, but art endures."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="fieldExampleMeaning">Nghĩa câu ví dụ</label>
            <textarea id="fieldExampleMeaning" class="form-input form-textarea" placeholder="e.g. Vẻ đẹp thì phù du, nhưng nghệ thuật trường tồn."></textarea>
          </div>

          <!-- Ảnh câu ví dụ -->
          <div class="form-group">
            <label class="form-label" for="fieldImageFile">Ảnh câu ví dụ</label>
            <!-- Preview ảnh hiện tại hoặc ảnh vừa chọn -->
            <div id="imagePreviewWrap" style="display:none; margin-bottom:10px;">
              <img id="imagePreview" src="" alt="Preview" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:1px solid #eaedf2;" />
            </div>
            <input type="file" id="fieldImageFile" class="form-input form-input--file" accept="image/*" />
            <p class="form-hint">Khi sửa, chỉ chọn file mới nếu muốn thay ảnh. Để trống = giữ ảnh cũ.</p>
          </div>

          <div class="form-group">
            <label class="form-label" for="fieldNote">Ghi chú thêm</label>
            <textarea id="fieldNote" class="form-input form-textarea" placeholder="Từ loại, gốc từ, cách dùng…"></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-cancel" id="btnCancelForm">Hủy</button>
            <button type="submit" class="btn-primary">Lưu từ</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal xác nhận xóa -->
    <div class="modal-overlay" id="confirmOverlay">
      <div class="modal-box confirm-box">
        <div class="confirm-icon">🗑️</div>
        <h3 class="confirm-title">Xóa từ vựng?</h3>
        <p class="confirm-msg" id="confirmMsg">Bạn có chắc muốn xóa từ này không?</p>
        <div class="form-actions">
          <button class="btn-cancel" id="btnCancelDelete">Hủy</button>
          <button class="btn-danger" id="btnConfirmDelete">Xóa</button>
        </div>
      </div>
    </div>

  </div><!-- /sectionManager -->

  <!-- ═══════════════════════════════════════════
       SECTION B — POPUP WINDOW (?mode=popup)
       ═══════════════════════════════════════════ -->
  <div id="sectionPopup" style="display:none">
    <div class="popup-card" id="popupContent">
      <div style="color:#aaa;text-align:center;padding:40px">Đang tải…</div>
    </div>
  </div>



  <script src="config.js"></script>
  <script type="module" src="tuvung.js"></script>
</body>
</html>
