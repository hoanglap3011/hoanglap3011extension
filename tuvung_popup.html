<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Từ Vựng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:       #0f1b2d;
      --navy-mid:   #1a2d47;
      --gold:       #c8a84b;
      --gold-light: #e2c97e;
      --text-light: #a8b4c4;
      --white:      #ffffff;
      --transition: .2s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    html, body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(200,168,75,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(200,168,75,.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .popup-card {
      background: var(--navy-mid);
      border: 1px solid rgba(200,168,75,.25);
      border-radius: 20px;
      padding: 36px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
      position: relative;
      z-index: 1;
      animation: popupCardIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popupCardIn {
      from { opacity: 0; transform: translateY(24px) scale(.95); }
      to   { opacity: 1; transform: none; }
    }
    .popup-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(200,168,75,.12);
      border: 1px solid rgba(200,168,75,.3);
      padding: 4px 10px;
      border-radius: 50px;
      margin-bottom: 20px;
    }
    .popup-word {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .popup-ipa {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: var(--text-light);
      letter-spacing: .5px;
      margin-bottom: 4px;
      margin-top: -4px;
    }
    .popup-meaning {
      font-size: 17px;
      font-weight: 400;
      color: var(--gold-light);
      margin-bottom: 28px;
      font-style: italic;
    }
    .popup-section {
      margin-bottom: 16px;
      padding: 14px 16px;
      background: rgba(255,255,255,.04);
      border-radius: 10px;
      border-left: 2px solid rgba(200,168,75,.35);
    }
    .popup-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 5px;
    }
    .popup-section-text {
      font-size: 14px;
      color: #cdd5e0;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .popup-example-img {
      display: block;
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 8px;
    }
    .popup-note {
      margin-top: 20px;
      font-size: 12.5px;
      color: var(--text-light);
      font-style: italic;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .popup-note::before { content: '📝 '; }
    .error-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }
    .error-state .icon { font-size: 48px; margin-bottom: 16px; }
    .error-state p { font-size: 14px; line-height: 1.6; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
  </style>
</head>
<body>
<div class="popup-card" id="card">
  <div style="color:#a8b4c4;text-align:center;padding:40px">Đang tải…</div>
</div>
<script>
  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function render(entry) {
    if (!entry || !entry.word) {
      document.getElementById('card').innerHTML = `
        <div class="error-state">
          <div class="icon">📭</div>
          <p>Không có dữ liệu.<br/>Kiểm tra lại Shortcut nhé!</p>
        </div>`;
      return;
    }

    let html = `
      <div class="popup-badge">✦ Từ vựng hôm nay</div>
      <div class="popup-word">${esc(entry.word)}</div>
      ${entry.ipa ? `<div class="popup-ipa">${esc(entry.ipa)}</div>` : ''}
      <div class="popup-meaning">${esc(entry.meaning)}</div>
    `;

    if (entry.example) html += `
      <div class="popup-section">
        <div class="popup-section-label">Câu ví dụ</div>
        <div class="popup-section-text">${esc(entry.example)}</div>
      </div>`;

    if (entry.imageUrl) html += `
      <div class="popup-section">
        <div class="popup-section-label">Hình ảnh</div>
        <img class="popup-example-img" src="${esc(entry.imageUrl)}" />
      </div>`;

    if (entry.exampleMeaning) html += `
      <div class="popup-section">
        <div class="popup-section-label">Nghĩa câu ví dụ</div>
        <div class="popup-section-text">${esc(entry.exampleMeaning)}</div>
      </div>`;

    if (entry.note) html += `
      <div class="popup-note">${esc(entry.note)}</div>`;

    document.getElementById('card').innerHTML = html;
  }

  try {
    // Đọc từ hash: tuvung_popup.html#{"word":"...","meaning":"..."}
    // Shortcuts chỉ cần ghép: URL_BASE + "#" + «Item from List»
    const hash = window.location.hash.slice(1); // bỏ dấu #
    if (hash) {
      render(JSON.parse(decodeURIComponent(hash)));
    } else {
      render(null);
    }
  } catch(e) {
    document.getElementById('card').innerHTML = `
      <div class="error-state">
        <div class="icon">⚠️</div>
        <p>Lỗi: ${esc(e.message)}</p>
      </div>`;
  }
</script>
</body>
</html>
