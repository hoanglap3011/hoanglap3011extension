<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viết Gì Đó</title>
    <link rel="stylesheet" href="library/choices.min.css" />
    <link rel="stylesheet" href="library/quill.snow.min.css">
    <link rel="stylesheet" href="vietgido.css">
</head>

<body>
    <main class="container">

        <div class="danhMuc-row">
            <select id="danhMucSelect"></select>
        </div>

        <div class="content">
            <div id="entriesContainer"></div>

            <div class="buttonsContainer">
                <button id="addBtn" type="button" class="btn btn--add" aria-label="Thêm vùng nhập liệu">+</button>
                <button id="submitBtn" type="button" class="btn btn--submit" aria-label="Lưu dữ liệu">💾</button>
                <button id="updateDanhMucBtn" type="button" class="btn btn--update"
                    aria-label="Cập nhật danh mục">📁</button>
            </div>

            <div class="switchRow">
                <label for="autoNextTheLoaiBietOnSwtich" class="switchLabel">Tự Thêm Thể Loại Biết Ơn</label>
                <label class="switch">
                    <input type="checkbox" id="autoNextTheLoaiBietOnSwtich" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="switchRow">
                <label for="autoHideUnRequiredFieldSwtich" class="switchLabel">Ẩn trường không bắt buộc</label>
                <label class="switch">
                    <input type="checkbox" id="autoHideUnRequiredFieldSwtich" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchRow">
                <label for="toggleAllToolbarsSwitch" class="switchLabel">Hiển thị Toolbar Soạn Thảo</label>
                <label class="switch">
                    <input type="checkbox" id="toggleAllToolbarsSwitch">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchRow">
                <label for="toggleCongratsOverlaySwitch" class="switchLabel">Hiển thị Hiệu ứng Ăn mừng</label>
                <label class="switch">
                    <input type="checkbox" id="toggleCongratsOverlaySwitch" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </main>
    </div>
    </main>

    <div id="loadingOverlay">
        <div class="loading-content">
            <div class="loader"></div>
            <p id="loadingQuote"></p>
        </div>
    </div>
    <div id="congratsOverlay">
        <lottie-player id="lottie-main-player" background="transparent" speed="1" loop>
        </lottie-player>
    </div>
    <script src="library/choices.min.js" defer></script>
    <script src="library/quill.min.js" defer></script>
    <script src="library/cleave.min.js"></script>
    <script src="library/lottie-player.js"></script>

    <script src="config.js"></script>
    <script type="module" src="vietgido.js" defer></script>
</body>

</html>
